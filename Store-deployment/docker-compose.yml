version: '3.8'

services:
  db:
    image: postgres:15
    container_name: store_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: store-dev
    ports:
      - "32300:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ../StoreBackend
      dockerfile: Dockerfile
    container_name: store_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_CONNECTION_STRING=Host=db;Port=5432;Database=store-dev;Username=postgres;Password=admin
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ../Store-frontend
      dockerfile: Dockerfile
    container_name: store_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
